name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: concert_alert
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/concert_alert
      JWT_SECRET: ci-secret
      KAKAO_REST_API_KEY: dummy
      KAKAO_CLIENT_SECRET: dummy
      KAKAO_REDIRECT_URI: http://localhost:4000/auth/kakao/callback

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter server exec prisma generate

      - name: Type check
        run: pnpm --filter server lint

      - name: Test
        run: pnpm --filter server test

      - name: Build
        run: pnpm --filter server build

      - name: Smoke test
        run: |
          pnpm --filter server exec prisma migrate deploy
          node apps/server/dist/index.js &
          SERVER_PID=$!
          sleep 3
          curl -f http://localhost:4000/health
          kill $SERVER_PID
