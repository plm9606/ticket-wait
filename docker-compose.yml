services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: concert_alert
      POSTGRES_USER: ${DATABASE_USER:-concert}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-concert_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
